<!DOCTYPE html>
<html>
<head>
    <title>AI Travel Planner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>AI Travel Planner</h1>

<form action="/plan" method="POST">

    <input type="text"
           name="destination"
           placeholder="Destination"
           required>

    <br><br>

    <input type="number"
           name="days"
           placeholder="Days"
           required>

    <br><br>

    <input type="text"
           name="budget"
           placeholder="Budget"
           required>

    <br><br>

    <select name="style">
        <option>Solo</option>
        <option>Family</option>
        <option>Couple</option>
        <option>Friends</option>
    </select>

    <br><br>

    <input type="text"
           name="interests"
           placeholder="Interests"
           required>

    <br><br>

    <button type="submit">
        Generate Itinerary
    </button>

</form>
{% if itinerary %}
    <h2>Your Travel Plan</h2>
    <pre>{{ itinerary }}</pre>
{% endif %}
</body>
</html>
